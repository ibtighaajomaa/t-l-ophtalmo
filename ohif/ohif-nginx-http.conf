server {
	listen 80;

	# OHIF's main JavaScript bundle is large. Compress it in transit instead of
	# sending ~15 MB on every cold viewer load.
	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_comp_level 6;
	gzip_types
		application/javascript
		application/json
		application/wasm
		image/svg+xml
		text/css
		text/javascript;

	include /etc/nginx/enabled-sites/*.conf;
}
