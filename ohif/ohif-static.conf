# both / and /Viewer/ shall actually open index.html since Viewer/ is handled by the react router
location / {
    alias /usr/share/nginx/html/;
    index index.html;
    try_files $uri $uri/ /index.html;
    # HTML and runtime configuration must be revalidated after a deployment.
    add_header Cache-Control "no-cache";
    # next 3 configs are required to enable SharedArrayBuffer (https://web.dev/coop-coep/)
    add_header Cross-Origin-Opener-Policy same-origin;
    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Resource-Policy same-origin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
}

# This file is mounted at runtime and is intentionally not content-hashed.
location = /app-config.js {
    root /usr/share/nginx/html;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Cross-Origin-Opener-Policy same-origin;
    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Resource-Policy same-origin;
}

# Webpack adds content hashes to production assets, so they can safely remain
# in the browser cache. A new build produces a new URL.
location ~* \.(?:js|css|wasm|woff2?|ttf|png|jpe?g|gif|svg|ico)$ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Cross-Origin-Opener-Policy same-origin;
    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Resource-Policy same-origin;
}

error_page   500 502 503 504  /50x.html;
location = /50x.html {
    root   /ohif-dist;
}
