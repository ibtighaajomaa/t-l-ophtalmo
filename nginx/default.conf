server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    # Frontend (TanStack Start SSR)
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Backend API
    location /api/ {
        set $backend_upstream http://backend:8001;
        proxy_pass $backend_upstream;
        proxy_read_timeout 600s;
        proxy_connect_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django built-in admin (moved to /django-admin/ to avoid conflict with React /admin)
    location /django-admin/ {
        set $backend_upstream http://backend:8001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files (admin CSS/JS/images served by WhiteNoise)
    location /static/ {
        set $backend_upstream http://backend:8001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oidc/ {
        set $backend_upstream http://backend:8001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OHIF Viewer (custom build v3.11.0 + MONAI extension)
    location ~ ^/ohif/(.*) {
        set $ohif_upstream http://ohif:80;
        proxy_pass $ohif_upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        client_max_body_size 0;
    }

    # Orthanc DICOM Server (main)
    location ~ ^/orthanc-container/(.*) {
        set $orthanc_container_upstream http://orthanc-container:8042;
        proxy_pass $orthanc_container_upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        client_max_body_size 0;
    }

    # Orthanc Plugin (OHIF plugin variant)
    location ~ ^/orthanc-plugin/(.*) {
        set $orthanc_plugin_upstream http://orthanc-plugin:8042;
        proxy_pass $orthanc_plugin_upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        client_max_body_size 0;
    }

    # MONAI Label AI Server
    location ~ ^/monai/(.*) {
        set $monai_upstream http://monai-label:8000;
        proxy_pass $monai_upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak
    location /auth/ {
        set $keycloak_upstream http://keycloak:8080;
        proxy_pass $keycloak_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
