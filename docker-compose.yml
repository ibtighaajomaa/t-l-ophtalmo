version: '3.8'

services:
  # =========================
  #  KEYCLOAK AUTHENTICATION
  # =========================
  postgres-keycloak:
    image: postgres:15
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - teleophtalmo

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      
      # JAVA_OPTS_APPEND sur une seule ligne pour éviter le crash au boot
      JAVA_OPTS_APPEND: "-Dmail.smtp.ssl.trust=* -Dmail.smtp.ssl.checkserveridentity=false -Dmail.smtp.starttls.enable=true"
      
      # 2. MÉTHODE SPI (Truststore physique)
      # On force Keycloak à utiliser notre keystore JKS contenant le vrai certificat
      KC_SPI_TRUSTSTORE_FILE_FILE: "/opt/keycloak/conf/rns_truststore.jks"
      KC_SPI_TRUSTSTORE_FILE_PASSWORD: "password"
      KC_SPI_TRUSTSTORE_FILE_HOSTNAME_VERIFICATION_POLICY: "ANY"
      
      # Option Quarkus pour la prod/dev
      QUARKUS_TLS_TRUST_ALL: "true"
      
      # Serve Keycloak under /auth/ path to match Nginx proxy
      KC_HTTP_RELATIVE_PATH: /auth
      
    volumes:
      - ./rns_truststore.jks:/opt/keycloak/conf/rns_truststore.jks
      - ./rns.crt:/opt/keycloak/conf/truststores/rns.crt
    ports:
      - "8180:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - teleophtalmo
    extra_hosts:
      - "smtp.rns.tn:193.95.84.21"


  # =========================
  #  DJANGO BACKEND
  # =========================
  postgres-django:
    image: postgres:15
    container_name: postgres-django
    environment:
      POSTGRES_DB: teleophtalmo
      POSTGRES_USER: django
      POSTGRES_PASSWORD: django_password
    ports:
      - "5434:5432"
    volumes:
      - postgres-django-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django -d teleophtalmo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - teleophtalmo

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DB_NAME: teleophtalmo
      DB_USER: django
      DB_PASSWORD: django_password
      DB_HOST: postgres-django
      DB_PORT: "5432"
      KEYCLOAK_SERVER_URL: http://keycloak:8080/auth/
      KEYCLOAK_REALM: HopitalRealm
      KEYCLOAK_CLIENT_ID: django-backend
      KEYCLOAK_CLIENT_SECRET: n3EKYvRxe3rkaP6eMoFYTHPSnlG9j4Pv
      OIDC_RP_CLIENT_ID: django-backend
      OIDC_RP_CLIENT_SECRET: n3EKYvRxe3rkaP6eMoFYTHPSnlG9j4Pv
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@teleophtalmo.com
      DJANGO_SUPERUSER_PASSWORD: admin
      OPENROUTER_API_KEY: placeholder-replace-with-your-key
      EMAIL_HOST: smtp.rns.tn
      EMAIL_PORT: "587"
      EMAIL_HOST_USER: "tele.ophtalmo"
      EMAIL_HOST_PASSWORD: "pohvbW2@"
      EMAIL_USE_TLS: "True"
      DEFAULT_FROM_EMAIL: tele.ophtalmo@rns.tn
      MONAI_CACHE_DIR: /root/.cache/monailabel
    volumes:
      - ./monai-label/cache:/root/.cache/monailabel
    depends_on:
      - postgres-django
      - keycloak
      - mailpit
      - redis
    networks:
      - teleophtalmo
    extra_hosts:
      - "smtp.rns.tn:193.95.84.21"

  # =========================
  #  REDIS (Celery Broker)
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - teleophtalmo

  # =========================
  #  CELERY WORKER
  # =========================
  celery-worker:
    build:
      context: ./backend
    container_name: celery-worker
    restart: unless-stopped
    command: celery -A config worker -l info
    environment:
      DB_NAME: teleophtalmo
      DB_USER: django
      DB_PASSWORD: django_password
      DB_HOST: postgres-django
      DB_PORT: "5432"
      KEYCLOAK_SERVER_URL: http://keycloak:8080/auth/
      KEYCLOAK_REALM: HopitalRealm
      KEYCLOAK_CLIENT_ID: django-backend
      KEYCLOAK_CLIENT_SECRET: n3EKYvRxe3rkaP6eMoFYTHPSnlG9j4Pv
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EMAIL_HOST: smtp.rns.tn
      EMAIL_PORT: "587"
      EMAIL_HOST_USER: "tele.ophtalmo"
      EMAIL_HOST_PASSWORD: "pohvbW2@"
      EMAIL_USE_TLS: "True"
      DEFAULT_FROM_EMAIL: tele.ophtalmo@rns.tn
      MONAI_CACHE_DIR: /root/.cache/monailabel
    volumes:
      - ./monai-label/cache:/root/.cache/monailabel
    depends_on:
      - redis
      - postgres-django
    networks:
      - teleophtalmo
    extra_hosts:
      - "smtp.rns.tn:193.95.84.21"

  # =========================
  #  CELERY BEAT (Scheduler)
  # =========================
  celery-beat:
    build:
      context: ./backend
    container_name: celery-beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DB_NAME: teleophtalmo
      DB_USER: django
      DB_PASSWORD: django_password
      DB_HOST: postgres-django
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
      - postgres-django
    networks:
      - teleophtalmo

  # =========================
  #  FRONTEND (TanStack Start)
  # =========================
  frontend:
    build:
      context: ./frontend/sight-bridge-main
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - teleophtalmo

  # =========================
  #  ORTHANC INDEX (PostgreSQL)
  # =========================
  orthanc-index:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - orthanc-index-data:/var/lib/postgresql/data
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      - teleophtalmo

  # =========================
  #  ORTHANC MAIN INSTANCE
  # =========================
  orthanc-container:
    image: orthancteam/orthanc:25.8.0
    restart: unless-stopped
    volumes:
      - orthanc-storage:/var/lib/orthanc/db/
      - ./orthanc/on_stable_study.lua:/etc/orthanc/scripts/on_stable_study.lua
    environment:
      ORTHANC__NAME: "OHIF in container"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      ORTHANC__DICOM_WEB__PUBLIC_ROOT: "/orthanc-container/dicom-web/"
      ORTHANC__ORTHANC_EXPLORER_2__UI_OPTIONS__ENABLE_OPEN_IN_OHIF_VIEWER_3: "true"
      ORTHANC__ORTHANC_EXPLORER_2__UI_OPTIONS__OHIF_VIEWER_3_PUBLIC_ROOT: "http://193.95.31.196/ohif/"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
      ORTHANC__LUA_SCRIPTS: '["/etc/orthanc/scripts/on_stable_study.lua"]'
      ORTHANC__POSTGRESQL: |
        {"Host": "orthanc-index"}
      VERBOSE_STARTUP: "true"
      VERBOSE_ENABLED: "true"
    depends_on:
      - orthanc-index
    networks:
      - teleophtalmo

  # =========================
  #  ORTHANC PLUGIN INSTANCE
  # =========================
  orthanc-plugin:
    image: orthancteam/orthanc:25.8.0
    restart: unless-stopped
    ports:
      - "8053:8042"
    volumes:
      - orthanc-storage:/var/lib/orthanc/db/
      - ./ohif-user-config-for-plugin.js:/ohif-user-config-for-plugin.js
    environment:
      ORTHANC__NAME: "OHIF in plugin"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      ORTHANC__DICOM_WEB__PUBLIC_ROOT: "/orthanc-plugin/dicom-web/"
      ORTHANC__ORTHANC_EXPLORER_2__UI_OPTIONS__ENABLE_OPEN_IN_OHIF_VIEWER_3: "true"
      ORTHANC__ORTHANC_EXPLORER_2__UI_OPTIONS__OHIF_VIEWER_3_PUBLIC_ROOT: "http://193.95.31.196/orthanc-plugin/ohif/"
      STONE_WEB_VIEWER_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      ORTHANC__OHIF: |
        {"RouterBasename": "/orthanc-plugin/ohif/", "DataSource": "dicom-web", "UserConfiguration": "/ohif-user-config-for-plugin.js"}
      ORTHANC__AUTHENTICATION_ENABLED: "false"
      ORTHANC__POSTGRESQL: |
        {"Host": "orthanc-index"}
      VERBOSE_STARTUP: "true"
      VERBOSE_ENABLED: "true"
    depends_on:
      - orthanc-index
    networks:
      - teleophtalmo

  # =========================
  #  OHIF VIEWER (Custom Build)
  # =========================
  ohif:
    build:
      context: .
      dockerfile: ohif/Dockerfile
    restart: unless-stopped
    volumes:
      - ./ohif/default-app-config.js:/usr/share/nginx/html/app-config.js
    depends_on:
      - orthanc-container
    networks:
      - teleophtalmo

  # =========================
  #  MONAI LABEL (AI SERVER)
  # =========================
  monai-label:
    image: projectmonai/monailabel:latest
    container_name: monai-label
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./monai-apps:/opt/monai/apps
      - monai-studies:/opt/monai/studies
      - ./monai-apps/patch_monailabel.py:/opt/monai/apps/patch_monailabel.py
      - ./monai-label/cache:/root/.cache/monailabel
      - ./monai-label/output:/output
    command: >
      sh -c "pip3 install -q transformers segmentation_models_pytorch 2>/dev/null;
      python3 /opt/monai/apps/patch_monailabel.py && 
      monailabel start_server
      --app /opt/monai/apps/radiology
      --studies http://orthanc-container:8042/dicom-web
      --conf models optic_disc_cup,vessel_seg,lesion_seg,dr_classification,composite_seg
      --conf sam2 false
      --host 0.0.0.0
      --port 8000
      --root_path /monai"
    environment:
      MONAI_LABEL_DICOMWEB_SEARCH_FILTER: "{}"
    depends_on:
      - orthanc-container
    networks:
      - teleophtalmo

  # =========================
  #  REPORT GENERATION API
  # =========================
  report-generator:
    build:
      context: ./backend/report-generation
    container_name: report-generator
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      DEVICE: auto
      VOLMO_REPO_ID: Yale-BIDS-Chen/VOLMO-2B
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - report-generator-hf-cache:/opt/hf-cache
    networks:
      - teleophtalmo

  # =========================
  #  MAILPIT (SMTP interne)
  # =========================
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - teleophtalmo

  # =========================
  #  NGINX REVERSE PROXY
  # =========================
  nginx:
    build: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - ohif
      - orthanc-container
      - orthanc-plugin
      - monai-label
    networks:
      - teleophtalmo

# =========================
#  VOLUMES
# =========================
volumes:
  postgres-keycloak-data:
  postgres-django-data:
  orthanc-index-data:
  orthanc-storage:
  monai-studies:
  report-generator-hf-cache:

networks:
  teleophtalmo:
    driver: bridge